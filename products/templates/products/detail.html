{% extends "base.html" %} {% block content %}

<div class="row">
  <div class="col-md-6">
    {% if product.image %}
    <img
      src="{{ product.image.url }}"
      class="img-fluid"
      alt="{{ product.name }}"
      style="max-height: 400px; object-fit: contain"
    />
    {% endif %}
  </div>

  <div class="col-md-6">
    <h2>{{ product.name }}</h2>
    <p class="text-muted">{{ product.category.name }}</p>

    <h4>{{ product.price }} TL</h4>

    <p>{{ product.description }}</p>

    <a href="{% url 'cart:add_to_cart' product.id %}" class="btn btn-dark">
      Add to Cart
    </a>
  </div>
</div>

{% endblock %}
