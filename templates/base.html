<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}CouponCart{% endblock %}</title>

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container">
        <!-- Logo -->
        <a class="navbar-brand" href="/">CouponCart</a>

        <div class="ms-4">
          {% for category in nav_categories %}
          <a
            href="{% url 'products:category_products' category.slug %}"
            class="me-3 text-decoration-none text-dark"
          >
            {{ category.name }}
          </a>
          {% endfor %}
        </div>
        <!-- Sağ taraf -->
        <div>
          {% if user.is_authenticated %}
          <span class="me-2">Hello, {{ user.username }}</span>
          <a href="/accounts/logout/" class="btn btn-danger btn-sm">Logout</a>
          {% else %}
          <a href="/accounts/login/" class="btn btn-outline-primary btn-sm"
            >Login</a
          >
          <a href="/accounts/register/" class="btn btn-outline-secondary btn-sm"
            >Register</a
          >
          {% endif %}

          <a href="#" class="btn btn-dark btn-sm">Cart</a>
        </div>
      </div>
    </nav>

    <!-- İçerik -->
    <div class="container mt-4">{% block content %} {% endblock %}</div>
  </body>
</html>
